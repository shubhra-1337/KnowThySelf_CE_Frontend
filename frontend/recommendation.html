<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KnowThySelf | Recommendations</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      /* ═══════════════════════════════════════════
         ONE UI SERENITY — DARK MODE (Default)
         ═══════════════════════════════════════════ */
      :root {
        --bg-dark: #0f172a;
        --calm-bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        --text-main: #f1f5f9;
        --text-muted: #94a3b8;
        --highlight: #5709e7;
        --contrast: #38bdf8;
        /* Vibrant teal contrast */

        --glass-bg: linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.04),
          rgba(255, 255, 255, 0.01)
        );
        --glass-border: rgba(255, 255, 255, 0.06);
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
        --btn-text: #0f172a;
      }

      /* ═══════════════════════════════════════════
         LIGHT MODE OVERRIDES (Serene Sky)
         ═══════════════════════════════════════════ */
      body.light-mode {
        /* Deep slate text ensures perfect readability */
        --bg-dark: #f8fafc;
        --calm-bg-gradient: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);

        --text-main: #020617;
        --text-muted: #334155;

        /* One UI Blue for primary actions, with vibrant teal as contrast */
        --highlight: #2563eb;
        --contrast: #4f46e5;

        /* Crisp frosted glass that rests beautifully over the blue background */
        --glass-bg: linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.75),
          rgba(255, 255, 255, 0.45)
        );
        --glass-border: rgba(30, 41, 59, 0.1);
        --glass-shadow: 0 8px 32px rgba(30, 41, 59, 0.08);
        --btn-text: #ffffff;

        /* Surface overrides for better contrast */
        --surface-bg: rgba(0, 0, 0, 0.04);
        --surface-bg-hover: rgba(0, 0, 0, 0.06);
        --surface-bg-active: rgba(0, 0, 0, 0.08);
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Lexend", sans-serif;
        background: var(--bg-dark);
        color: var(--text-main);
        min-height: 100vh;
        padding: 60px 40px;
        animation: pageFadeIn 0.6s ease-out;
        position: relative;
        transition:
          background 0.35s ease,
          color 0.35s ease;
      }

      h1,
      h2,
      h3,
      .brand,
      .title,
      .section-title,
      .q-text,
      #resultType {
        font-family: "Lexend", sans-serif;
      }

      p {
        text-align: justify;
        hyphens: auto;
        -webkit-hyphens: auto;
      }

      .calm-bg {
        position: fixed;
        inset: 0;
        z-index: -2;
        background: var(--calm-bg-gradient);
        transition: background 0.35s ease;
      }

      #particleCanvas {
        position: fixed;
        inset: 0;
        z-index: -1;
        opacity: 0.6;
      }

      /* ── Theme Toggle (fixed top-right) ── */
      .theme-toggle {
        position: fixed;
        top: 20px;
        right: 20px;
        z-index: 50;
        width: 44px;
        height: 44px;
        border-radius: 50%;
        border: 1px solid var(--glass-border);
        background: var(--glass-bg);
        backdrop-filter: blur(12px);
        color: var(--text-muted);
        font-size: 1.3rem;
        cursor: pointer;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "Lexend", sans-serif;
      }

      .theme-toggle:hover {
        border-color: var(--highlight);
        color: var(--highlight);
        background: rgba(96, 165, 250, 0.08);
      }

      .header-section {
        text-align: center;
        margin-bottom: 50px;
        max-width: 1200px;
        margin-left: auto;
        margin-right: auto;
        z-index: 1;
        position: relative;
      }

      h1 {
        font-size: clamp(1.8rem, 4vw, 2.8rem);
        color: var(--text-main);
        letter-spacing: 0.5px;
        margin-bottom: 10px;
        font-weight: 800;
      }

      /* BENTO RESPONSIVE GRID */
      #recommendationContent {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 32px;
        max-width: 1200px;
        margin: 0 auto;
        min-height: 300px;
        z-index: 1;
        position: relative;
        text-align: left;
      }

      /* GLASS CARDS */
      .category-card {
        background: var(--glass-bg);
        backdrop-filter: blur(20px) saturate(1.4);
        -webkit-backdrop-filter: blur(20px) saturate(1.4);
        border: 1px solid var(--glass-border);
        border-radius: 24px;
        padding: 40px;
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
        height: 100%;
        animation: fadeIn 0.8s ease-out;
        box-shadow: var(--glass-shadow);
      }

      .category-card:hover {
        transform: translateY(-6px);
        box-shadow: 0 16px 40px rgba(0, 0, 0, 0.2);
        border-color: rgba(96, 165, 250, 0.15);
      }

      .category-card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 2px;
        background: linear-gradient(
          90deg,
          transparent,
          var(--highlight),
          transparent
        );
        opacity: 0.25;
      }

      .category-card h2 {
        font-size: 1.35rem;
        color: var(--text-main);
        margin-bottom: 20px;
        border-bottom: 1px solid var(--glass-border);
        padding-bottom: 10px;
        font-weight: 700;
      }

      .category-card ul {
        list-style: none;
      }

      .category-card ul li {
        padding: 16px 20px;
        margin-bottom: 12px;
        background: var(--surface-bg, rgba(255, 255, 255, 0.02));
        border-radius: 10px;
        color: var(--text-muted);
        font-size: 1rem;
        transition: all 0.25s ease;
        border-left: 3px solid transparent;
        font-weight: 500;
      }

      .category-card ul li:hover {
        background: rgba(96, 165, 250, 0.08);
        color: var(--highlight);
        border-left: 3px solid var(--highlight);
        padding-left: 20px;
      }

      .nav-buttons {
        display: flex;
        justify-content: center;
        gap: 20px;
        margin-top: 60px;
        padding-bottom: 40px;
        z-index: 1;
        position: relative;
        flex-wrap: wrap;
      }

      .nav-btn {
        background: var(--surface-bg, rgba(255, 255, 255, 0.02));
        backdrop-filter: blur(10px);
        color: var(--text-muted);
        border: 1px solid var(--glass-border);
        padding: 12px 35px;
        border-radius: 30px;
        cursor: pointer;
        transition: all 0.3s ease;
        font-size: 1.05rem;
        font-family: "Lexend", sans-serif;
        font-weight: 600;
      }

      .nav-btn:hover {
        color: var(--highlight);
        border-color: var(--highlight);
        background: rgba(96, 165, 250, 0.08);
      }

      .loading-wrapper {
        grid-column: 1 / -1;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 200px;
      }

      .simple-loader {
        font-size: 1.4rem;
        color: var(--highlight);
        font-weight: 600;
        animation: pulseText 1.5s infinite ease-in-out;
        display: flex;
        align-items: center;
        gap: 15px;
      }

      .spinner {
        width: 22px;
        height: 22px;
        border: 3px solid rgba(96, 165, 250, 0.2);
        border-top: 3px solid var(--highlight);
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      @keyframes pulseText {
        0% {
          opacity: 0.6;
        }

        50% {
          opacity: 1;
        }

        100% {
          opacity: 0.6;
        }
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }

        100% {
          transform: rotate(360deg);
        }
      }

      @keyframes pageFadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }

        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
        }

        to {
          opacity: 1;
        }
      }

      /* ── Tablet ── */
      @media (max-width: 768px) {
        body {
          padding: 40px 20px;
        }

        .header-section {
          margin-bottom: 30px;
        }

        h1 {
          font-size: clamp(1.4rem, 5vw, 2rem);
        }

        #recommendationContent {
          grid-template-columns: 1fr;
          gap: 20px;
        }

        .category-card {
          padding: 28px 24px;
          border-radius: 20px;
        }

        .category-card h2 {
          font-size: 1.2rem;
        }

        .category-card ul li {
          padding: 12px 16px;
          font-size: 0.95rem;
        }

        .nav-buttons {
          margin-top: 40px;
          gap: 14px;
        }

        .nav-btn {
          padding: 10px 26px;
          font-size: 0.95rem;
        }
      }

      /* ── Small phones ── */
      @media (max-width: 480px) {
        body {
          padding: 28px 12px;
        }

        .header-section {
          margin-bottom: 24px;
        }

        h1 {
          font-size: 1.3rem;
        }

        .header-section p {
          font-size: 1rem;
        }

        .category-card {
          padding: 22px 18px;
          border-radius: 16px;
        }

        .category-card h2 {
          font-size: 1.1rem;
          margin-bottom: 14px;
        }

        .category-card ul li {
          padding: 12px 14px;
          margin-bottom: 8px;
          font-size: 0.9rem;
        }

        .nav-buttons {
          margin-top: 30px;
          flex-direction: column;
          gap: 10px;
          padding-bottom: 24px;
        }

        .nav-btn {
          width: 100%;
          text-align: center;
          padding: 12px 20px;
          font-size: 0.9rem;
        }

        .theme-toggle {
          width: 38px;
          height: 38px;
          font-size: 1.1rem;
          top: 14px;
          right: 14px;
        }
      }

      .fade-out {
        opacity: 0;
        transition: opacity 0.5s ease;
      }
    </style>
  </head>

  <body>
    <!-- Theme flash prevention -->
    <script>
      if (localStorage.getItem("theme") === "light")
        document.body.classList.add("light-mode");
    </script>

    <div class="calm-bg"></div>
    <canvas id="particleCanvas"></canvas>
    <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">
      🌓
    </button>

    <div class="header-section">
      <h1>Personalized Recommendations</h1>
      <p
        style="
          color: var(--text-muted);
          font-size: 1.2rem;
          font-weight: 500;
          text-align: center;
        "
      >
        Curated especially for
        <span
          id="displayType"
          style="color: var(--highlight); font-weight: 700"
        ></span>
      </p>
    </div>

    <div id="recommendationContent"></div>

    <div class="nav-buttons">
      <button class="nav-btn" onclick="goBack()">Return to Dashboard</button>
      <button class="nav-btn" onclick="logout()">Securely Log Out</button>
    </div>

    <script>
      function toggleTheme() {
        document.body.classList.toggle("light-mode");
        localStorage.setItem(
          "theme",
          document.body.classList.contains("light-mode") ? "light" : "dark",
        );
      }

      const result = localStorage.getItem("mbtiResult");
      const container = document.getElementById("recommendationContent");
      document.getElementById("displayType").innerText = result;
      const API_BASE = "http://localhost:5000";
      if (!result) {
        container.innerHTML =
          '<p style="text-align:center; color: var(--text-main);">No results found. Please retake the questionnaire.</p>';
      } else {
        container.innerHTML = `<div class="loading-wrapper"><div class="simple-loader"><div class="spinner"></div>Loading recommendations for ${result}...</div></div>`;
        fetch(`${API_BASE}/mbti/${result}`)
          .then((r) => {
            if (!r.ok) throw new Error("Server communication failed");
            return r.json();
          })
          .then((data) => displayRecommendations(data, result))
          .catch((e) => {
            console.error("Error fetching data:", e);
            container.innerHTML = `<div style="text-align:center; grid-column: 1/-1; padding: 60px 20px;"><p style="color: #f87171; font-size: 1.3rem; font-weight: 600;">Connection could not be established.</p><p style="font-size:1rem; color: var(--text-muted); margin-top: 10px;">Please ensure the local server is active on port 5000.</p></div>`;
          });
      }

      function displayRecommendations(typeData, result) {
        if (typeData) {
          container.innerHTML = `
                    <div class="category-card"><h2>Music for You</h2><ul>${(typeData.songs || []).map((s) => `<li>${s}</li>`).join("")}</ul></div>
                    <div class="category-card"><h2>Books for You</h2><ul>${(typeData.books || []).map((b) => `<li>${b}</li>`).join("")}</ul></div>
                    <div class="category-card"><h2>Career Pathways</h2><ul>${(typeData.careers || []).map((c) => `<li>${c}</li>`).join("")}</ul></div>
                    <div class="category-card"><h2>Movies for You</h2><ul>${(typeData.movies || []).map((m) => `<li>${m}</li>`).join("")}</ul></div>`;
        } else {
          container.innerHTML = `<p style="text-align:center; grid-column: 1/-1; color: var(--text-main);">No recommendations found for ${result}. Please try again later.</p>`;
        }
      }
      function goBack() {
        document.body.classList.add("fade-out");
        setTimeout(() => (window.location.href = "dashboard.html"), 500);
      }
      function logout() {
        localStorage.clear();
        document.body.classList.add("fade-out");
        setTimeout(() => (window.location.href = "home.html"), 500);
      }
    </script>

    <!-- Particle Effect -->
    <script>
      const canvas = document.getElementById("particleCanvas");
      const ctx = canvas.getContext("2d");
      let particles = [];

      function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      window.addEventListener("resize", resize);
      resize();

      class Particle {
        constructor() {
          this.x = Math.random() * canvas.width;
          this.y = Math.random() * canvas.height;
          this.vy = Math.random() * 0.5 + 0.3;
          this.size = Math.random() * 2 + 1;
          this.op = Math.random() * 0.4 + 0.3;
          const hue = Math.floor(Math.random() * 20) + 200;
          const sat = Math.floor(Math.random() * 30) + 70;
          const light = document.body.classList.contains("light-mode")
            ? Math.floor(Math.random() * 15) + 45
            : Math.floor(Math.random() * 25) + 60;
          this.color = `hsla(${hue}, ${sat}%, ${light}%, ${this.op})`;
        }
        update() {
          this.y += this.vy;
          this.x += Math.sin(this.y * 0.01) * 0.3;
          if (this.y > canvas.height) {
            this.y = -10;
            this.x = Math.random() * canvas.width;
          }
        }
        draw() {
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
          ctx.fillStyle = this.color;
          ctx.fill();
        }
      }

      function spawnParticles() {
        particles = [];
        for (let i = 0; i < 100; i++) {
          particles.push(new Particle());
        }
      }
      spawnParticles();

      if (typeof toggleTheme === "function") {
        const _prev = toggleTheme;
        window.toggleTheme = function () {
          _prev();
          spawnParticles();
        };
      }

      function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles.forEach((p) => {
          p.update();
          p.draw();
        });
        requestAnimationFrame(animate);
      }
      animate();
    </script>
  </body>
</html>
